<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESPORTE TOTAL - CONTATO</title>
    <link rel="stylesheet" href="./css/main.css" />

    <script src="./js/contato.js" defer></script>
 
 
  </head>
  <body>
    <header class="cabecalho">
      <nav class="cabecalho__navbar">
        <ul class="cabecalho__lista">
          <li class="cabecalho__list-item">
            <a
              class="cabecalho__link cabecalho__link--active"
              href="./index.html"
              >Home</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main class="conteudo">
      <section class="hero">
        <div class="hero__container">
          <h1 class="hero__title">CONTATO</h1>
          <div id="msg">
          </div>
          <form action="#" method="GET">
            <fieldset>
              <legend>Login</legend>
              <div>
                <label for="idEmail">Email</label>
                <input
                  type="text"
                  name="email"
                  id="idEmail"
                  placeholder="Digite seu email"
                  minlength="13"
                  maxlength="150"
                  required />
                  <span id="msg-email"></span>
              </div>
              <div>
                <label for="idNome">Nome</label>
                <input
                  type="text"
                  name="nome"
                  id="idNome"
                  placeholder="Digite seu nome"
                  minlength="3"
                  maxlength="250"
                  required />
              </div>
              <div>
            <button type="submit" id="btnEnviar">Enviar</button>
            </div>
            </fieldset>
          </form>

        </div>
      </section>
    </main>

    <footer>
      <p class="unico">ESPORTE TOTAL &copy; - Todos os direitos reservados</p>
    </footer>



  </body>
</html>
